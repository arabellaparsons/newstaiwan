<style>
        /* --- CORE: Black Gold Luxury Variables --- */
        :root {
            --nk-bg-darkest: #050505;
            --nk-bg-panel: #0f0f0f;
            --nk-bg-card: #141414;
            --nk-gold-rich: #C5A059;      /* 奢華主金 */
            --nk-gold-dark: #8a6d3b;      /* 暗金 */
            --nk-gold-light: #e6d8be;     /* 亮金/香檳金 */
            --nk-text-main: #e0e0e0;
            --nk-font-en: system-ui, -apple-system, BlinkMacSystemFont, "PingFang TC", "Microsoft JhengHei", "Heiti TC", "Segoe UI", Roboto, Arial, sans-serif; 
            --nk-font-tc: system-ui, -apple-system, BlinkMacSystemFont, "PingFang TC", "Microsoft JhengHei", "Heiti TC", "Segoe UI", Roboto, Arial, sans-serif;    
            --nk-font-sans: system-ui, -apple-system, BlinkMacSystemFont, "PingFang TC", "Microsoft JhengHei", "Heiti TC", "Segoe UI", Roboto, Arial, sans-serif;     
            /* --- PLYR 控制列變數覆寫 --- */
            --x_T0Ksm-color-main: var(--nk-gold-rich); 
            --x_T0Ksm-range-track-height: 3px;         /* 極細進度條 */
            --x_T0Ksm-range-thumb-height: 5px;        /* 播放小球高度 */
            --x_T0Ksm-range-thumb-width: 5px;         /* 播放小球寬度 */
            --x_T0Ksm-range-thumb-background: #ffffff; /* 小球白色 */
            --x_T0Ksm-range-thumb-shadow: 0 0 7px rgba(255, 255, 255, 0.9), 0 0 20px rgba(255, 255, 255, 0.6); /* 小球白色光暈 */
            --x_T0Ksm-tooltip-radius: 0px;             /* 提示框強制直角 */
            --x_T0Ksm-menu-radius: 0px;                /* 選單強制直角 */
            --x_T0Ksm-control-radius: 0px;             /* 按鈕本身強制直角 */
        }
        /* --- RESET & BASE --- */
        * { box-sizing: border-box; margin: 0; padding: 0; outline: none; }
        body, html {
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            background-color: var(--nk-bg-darkest);
            background-image: radial-gradient(circle at center top, #1a1a1a 0%, #000000 80%);
            color: var(--nk-text-main);
            font-family: var(--nk-font-tc);
            min-height: 100vh;
            display: flex; 
            flex-direction: column;
            align-items: center; 
            overflow-x: hidden;
        }
        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: url('https://www.transparenttextures.com/patterns/stardust.png');
            opacity: 0.15;
            pointer-events: none;
            z-index: 0;
        }
        .x_DGaeq {
            width: 100%;
            max-width: 800px;
            text-align: center;
            z-index: 2;
            padding: 60px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        /* --- GLASS OVAL HEADER --- */

<script>
    document.addEventListener("DOMContentLoaded", function() {
        const targetBlock = document.getElementById('scroll-video-block');
        if (targetBlock) {
            const video = targetBlock.querySelector('video');
            const btn = targetBlock.querySelector('.play-pause-btn');
            const icon = targetBlock.querySelector('.icon');
            // 雙重保險：JS 強制設定靜音與 inline 播放，避免 iOS/Safari 阻擋
            if (video) {
                video.muted = true;
                video.defaultMuted = true;
                video.playsInline = true;
            }
            // 建立 IntersectionObserver：滑到 50% 觸發
            const videoObserver = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    if (entry.isIntersecting) {
                        // 進入畫面 -> 播放
                        if (video.paused) {
                            video.play().then(() => {
                                if(icon) icon.src = "pause.svg";
                            }).catch(e => console.error("Autoplay prevented:", e));
                        }
                    } else {
                        // 離開畫面 -> 暫停
                        if (!video.paused) {
                            video.pause();
                            if(icon) icon.src = "play.svg";
                        }
                    }
                });
            }, { threshold: 0.5 });
            // 開始監視該區塊
            videoObserver.observe(targetBlock);
            // 按鈕手動點擊邏輯
            if (btn && video && icon) {
                btn.addEventListener('click', () => {
                    if (video.paused) {
                        video.play();
                        icon.src = "pause.svg";
                    } else {
                        video.pause();
                        icon.src = "play.svg";
                    }
                });
                // 按鈕 Hover 變色特效
                btn.addEventListener('mouseenter', () => {
                    btn.style.background = 'var(--nk-gold-rich)';
                });
                btn.addEventListener('mouseleave', () => {
                    btn.style.background = 'rgba(0, 0, 0, 0.6)';
                });
            }
        }
    });
</script>
